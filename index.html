<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Real-Time TV Monitor - KORPASGAT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <style>
        /* (Gunakan CSS V32 milik Mas sebelumnya agar tampilan tetap konsisten) */
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #11141a; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background-color: #1a1f2c; padding: 20px; text-align: center; border-bottom: 3px solid #3498db; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin-top: 15px; }
        .btn-source, .btn-cloud, .btn-fullscreen, .btn-picker { padding: 12px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-source { background-color: #e74c3c; }
        .btn-cloud { background-color: #2ecc71; }
        .btn-picker { background-color: #9b59b6; }
        .btn-fullscreen { background-color: #f39c12; }
        .content-box { width: 90%; max-width: 1200px; background: #ffffff; color: #222222; padding: 25px; border-radius: 10px; margin: 20px auto; min-height: 400px; }
    </style>
</head>
<body>

<div class="header">
    <div class="control-panel">
        <label for="fileInput" class="btn-source">📁 Upload File</label>
        <input type="file" id="fileInput" style="display: none;">
        <button id="picker-btn" class="btn-picker">📂 Pilih dari Drive</button>
        <button class="btn-fullscreen" onclick="toggleFullScreen()">🖥️ Full Screen</button>
    </div>
</div>

<div class="content-box" id="contentBox">Menunggu data...</div>

<script>
    // --- KONFIGURASI PENTING ---
    const CLIENT_ID = 'GANTI_DENGAN_CLIENT_ID_MAS';
    const API_KEY = 'GANTI_DENGAN_API_KEY_MAS';

    // --- LOGIKA GOOGLE PICKER ---
    let tokenClient;
    let accessToken = null;

    window.onload = () => {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.readonly',
            callback: (resp) => { accessToken = resp.access_token; createPicker(); },
        });
    };

    document.getElementById('picker-btn').onclick = () => {
        if (accessToken) { createPicker(); } 
        else { tokenClient.requestAccessToken(); }
    };

    function createPicker() {
        const picker = new google.picker.PickerBuilder()
            .setOAuthToken(accessToken)
            .setDeveloperKey(API_KEY)
            .setCallback((data) => {
                if (data[google.picker.Response.ACTION] == google.picker.Action.PICKED) {
                    let url = data[google.picker.Response.DOCUMENTS][0].embedUrl;
                    document.getElementById('contentBox').innerHTML = `<iframe src="${url}" style="width:100%; height:500px;"></iframe>`;
                }
            })
            .build();
        picker.setVisible(true);
    }
</script>
</body>
</html>
